<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港街景猜謎</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #mly { width: 100%; height: 50vh; }
        #map { width: 100%; height: 50vh; }
        #nextBtn {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            padding: 15px 25px; font-size: 20px;
            background-color: white; border: 2px solid #333; cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="nextBtn" onclick="nextLocation()">下一關</button>
    <div id="mly"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js"></script>
    <script src="script.js"></script>
</body>
</html>
